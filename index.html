<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鄭威名片</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #121212;
            color: #F2F2F2;
            font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
        }
        .card {
            width: min(560px, calc(100% - 32px));
            border-radius: 24px;
            background: #1C1C1C;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 80px rgba(0,0,0,0.55);
            overflow: hidden;
        }
        .hero {
            padding: 40px 32px 24px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent);
            text-align: left;
        }
        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.2rem);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .hero p {
            margin: 12px 0 0;
            color: #B8B8B8;
            font-size: 1rem;
            letter-spacing: 0.04em;
            text-align: left;
        }
        .details {
            padding: 24px 32px 32px;
            display: grid;
            gap: 16px;
            text-align: left;
        }
        .detail-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            padding: 16px 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .detail-label {
            color: #9A9A9A;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .detail-value {
            color: #F8F8F8;
            font-size: 1rem;
            text-align: right;
            word-break: break-word;
        }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 0 32px;
        }
        @media (max-width: 480px) {
            .hero, .details {
                padding-left: 24px;
                padding-right: 24px;
            }
            .detail-row {
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>
    <article class="card">
        <section class="hero">
            <h1>鄭威</h1>
            <p>劇場演員 · 生活美學探索者</p>
        </section>
        <div class="divider"></div>
        <section class="details">
            <div class="detail-row">
                <span class="detail-label">出生</span>
                <span class="detail-value">2002.9.6（處女座）</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">職業</span>
                <span class="detail-value">劇場演員</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">興趣</span>
                <span class="detail-value">調酒、衝浪、逛夜市</span>
            </div>
        </section>
    </article>
</body>
</html>
