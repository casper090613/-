<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鄭威名片</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #121212;
            color: #F2F2F2;
            font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
        }
        .card {
            width: min(560px, calc(100% - 32px));
            border-radius: 24px;
            background: #1C1C1C;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 30px 80px rgba(0,0,0,0.55);
            overflow: hidden;
        }
        .hero {
            padding: 40px 32px 24px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent);
            text-align: left;
        }
        .hero h1 {
            margin: 0;
            font-size: clamp(2rem, 4vw, 3.2rem);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        .hero p {
            margin: 12px 0 0;
            color: #B8B8B8;
            font-size: 1rem;
            letter-spacing: 0.04em;
            text-align: left;
        }
        .details {
            padding: 24px 32px 32px;
            display: grid;
            gap: 16px;
            text-align: left;
        }
        .detail-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            align-items: center;
            padding: 16px 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .detail-label {
            color: #9A9A9A;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .detail-value {
            color: #F8F8F8;
            font-size: 1rem;
            text-align: right;
            word-break: break-word;
        }
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 0 32px;
        }
        .actions {
            padding: 24px 32px 32px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #F2F2F2;
            font-size: 0.95rem;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }
        .content {
            padding: 0 32px 32px;
            display: none;
        }
        .content.show {
            display: block;
        }
        .content ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .content li {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            color: #B8B8B8;
        }
        .content li:last-child {
            border-bottom: none;
        }
        .content p {
            margin: 0;
            color: #B8B8B8;
            line-height: 1.6;
        }
        @media (max-width: 480px) {
            .hero, .details, .actions, .content {
                padding-left: 24px;
                padding-right: 24px;
            }
            .actions {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <article class="card">
        <section class="hero">
            <h1>鄭威</h1>
            <p>劇場演員 · 生活美學探索者</p>
        </section>
        <div class="divider"></div>
        <section class="details">
            <div class="detail-row">
                <span class="detail-label">出生</span>
                <span class="detail-value">2002.9.6（處女座）</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">職業</span>
                <span class="detail-value">劇場演員</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">興趣</span>
                <span class="detail-value">調酒、衝浪、逛夜市</span>
            </div>
        </section>
        <div class="divider"></div>
        <section class="actions">
            <button class="btn" onclick="showContent('experience')">瞭解更多</button>
            <button class="btn" onclick="showContent('fun')">點看看</button>
            <button class="btn" onclick="showContent('contact')">聯絡資訊</button>
        </section>
        <div id="experience" class="content">
            <ul>
                <li>墾丁鈕扣倉庫 - 調酒師</li>
                <li>高雄白開水劇團 - 舞監助理</li>
                <li>台北優人神鼓 - 全職演員</li>
            </ul>
        </div>
        <div id="fun" class="content">
            <p>沒有內容就是點看看而已</p>
        </div>
        <div id="contact" class="content">
            <p>Email: casper090613小老鼠@gmail.com</p>
            <p>Phone: +886905050077</p>
            <p>Line: Kiwi</p>
        </div>
    </article>
    <script>
        function showContent(id) {
            // 隱藏所有內容
            const contents = document.querySelectorAll('.content');
            contents.forEach(content => content.classList.remove('show'));
            
            // 顯示選中的內容
            const selected = document.getElementById(id);
            if (selected) {
                selected.classList.add('show');
            }
        }
    </script>
</body>
</html>
