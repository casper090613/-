<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鄭威的自我介紹</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #FF9A8B 0%, #FAD0C4 50%, #FFECB3 100%);
            color: #2B2B2B;
        }
        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            gap: 24px;
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.12);
            padding: 36px 30px;
            max-width: 720px;
            width: 100%;
            backdrop-filter: blur(12px);
        }
        h1 {
            margin: 0;
            font-size: clamp(2.4rem, 4vw, 4rem);
            letter-spacing: 0.08em;
            color: #D65A31;
        }
        h2 {
            margin: 16px 0 8px;
            color: #3A3A3A;
        }
        .intro {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #4B4B4B;
            margin: 0;
        }
        .highlight {
            color: #E67328;
            font-weight: 700;
        }
        .info-list {
            list-style: none;
            margin: 24px 0 0;
            padding: 0;
            display: grid;
            gap: 12px;
            text-align: right;
        }
        .info-list li {
            background: #FFF6E0;
            border: 1px solid rgba(230, 115, 40, 0.18);
            border-radius: 18px;
            padding: 16px 18px;
            font-size: 1rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #FFB36A;
            color: #ffffff;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(255, 147, 82, 0.22);
        }
        .footer {
            font-size: 0.95rem;
            color: #5B5B5B;
            margin-top: 16px;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .floating {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card floating">
            <h1>嗨，我是鄭威！</h1>
            <h2>關於我</h2>
            <ul class="info-list">
                <li><span class="tag">🙋</span><strong>姓名：</strong>鄭威</li>
                <li><span class="tag">🎂</span><strong>生日：</strong>2002.9.6（處女座）</li>
                <li><span class="tag">🎭</span><strong>職業：</strong>劇場演員</li>
                <li><span class="tag">🍹</span><strong>興趣：</strong>調酒、衝浪、逛夜市</li>
            </ul>
        </div>
    </div>
</body>
</html>
